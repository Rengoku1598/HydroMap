{% for alert in alerts %}
<div class="p-4 rounded-xl border transition-all duration-500 {% if alert.severity == 'critical' %}bg-red-500/10 border-red-500/30 text-red-200 animate-pulse-slow shadow-[0_0_15px_rgba(239,68,68,0.15)]{% else %}bg-slate-800/40 border-slate-700/50 text-slate-300{% endif %}">
    <div class="flex justify-between items-center mb-2">
        <span class="px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-tighter {% if alert.severity == 'critical' %}bg-red-500/20 text-red-400{% else %}bg-blue-500/20 text-blue-400{% endif %}">
            {{ alert.severity }}
        </span>
        <span class="text-[10px] font-mono opacity-40">{{ alert.timestamp|date:"H:i:s" }}</span>
    </div>
    <p class="text-xs font-semibold leading-relaxed mb-2">{{ alert.message }}</p>
    <div class="flex items-center text-[10px] opacity-40">
        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
        {{ alert.sensor.name }}
    </div>
</div>
{% empty %}
<div class="flex flex-col items-center justify-center p-12 opacity-20 text-center">
    <svg class="w-12 h-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    <p class="text-xs italic">Anomaliyalar qayd etilmadi</p>
</div>
{% endfor %}
