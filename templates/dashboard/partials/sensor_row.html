<div class="p-3 bg-slate-900 border border-slate-800 rounded-lg flex items-center justify-between group hover:border-blue-500/30 transition-all">
    <div class="flex items-center gap-3">
        <div class="w-1.5 h-1.5 rounded-full {% if sensor.status == 'active' %}bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]{% else %}bg-slate-700{% endif %}"></div>
        <span class="text-[11px] font-bold text-slate-300">{{ sensor.name }}</span>
    </div>
    <span class="text-[10px] font-mono text-slate-500 tracking-tighter">{{ sensor.value|floatformat:2 }} {{ sensor.unit }}</span>
</div>
